# Install:
#   sudo cp deploy/nginx.kinoregin.ru.conf /etc/nginx/sites-available/kinoregin.ru
#   sudo ln -sf /etc/nginx/sites-available/kinoregin.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (first time):
#   sudo certbot --nginx -d kinoregin.ru -d www.kinoregin.ru

upstream kinoregin_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name kinoregin.ru www.kinoregin.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://kinoregin.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kinoregin.ru www.kinoregin.ru;

    # certbot will inject ssl_certificate paths
    # ssl_certificate /etc/letsencrypt/live/kinoregin.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/kinoregin.ru/privkey.pem;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location /_next/static/ {
        proxy_pass http://kinoregin_app;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://kinoregin_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
