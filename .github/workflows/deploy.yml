name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - "kinostream/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy kinoregin.ru
    runs-on: ubuntu-latest
    if: github.repository == 'Egor2929/kinostream'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            APP_DIR="${DEPLOY_PATH}/kinostream"

            if [ ! -d "${DEPLOY_PATH}/.git" ]; then
              echo "Repository not found at ${DEPLOY_PATH}"
              echo "Run first-time setup from kinostream/deploy/setup-server.sh"
              exit 1
            fi

            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main

            cd "${APP_DIR}"
            npm ci
            npm run build

            if pm2 describe kinoregin >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --env production
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save
            curl -fsS http://127.0.0.1:3000/ >/dev/null
            echo "Deploy complete"
